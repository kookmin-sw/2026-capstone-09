<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Server — k6 Performance Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #0f172a;
    --surface: #1e293b;
    --border:  #334155;
    --muted:   #64748b;
    --text:    #f1f5f9;
    --sub:     #94a3b8;
    --blue:    #3b82f6;
    --green:   #22c55e;
    --red:     #ef4444;
    --yellow:  #f59e0b;
    --purple:  #8b5cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  header { padding: 18px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header span { color: var(--muted); font-size: 13px; }
  .badge { background: var(--blue); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: auto; }

  #drop-zone {
    margin: 36px auto; max-width: 560px;
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 52px 24px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  #drop-zone:hover, #drop-zone.over { border-color: var(--blue); background: rgba(59,130,246,.06); }
  #drop-zone .icon { font-size: 38px; margin-bottom: 12px; }
  #drop-zone p { color: var(--sub); line-height: 1.9; }
  #drop-zone strong { color: var(--text); }
  #file-input { display: none; }

  /* 진행바 */
  #progress-wrap { margin: 0 32px 20px; display: none; }
  #progress-label { color: var(--sub); font-size: 13px; margin-bottom: 6px; }
  #progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  #progress-fill { height: 100%; background: var(--blue); border-radius: 3px; width: 0%; transition: width .1s; }

  /* 탭 */
  #tabs-bar { padding: 0 32px; border-bottom: 1px solid var(--border); gap: 2px; flex-wrap: wrap; }
  .tab-btn { background: none; border: none; color: var(--sub); padding: 10px 18px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-x { margin-left: 6px; opacity: .4; font-size: 11px; }
  .tab-x:hover { opacity: 1; }

  /* 패널 */
  .panel { display: none; padding: 26px 32px; }
  .panel.active { display: block; }

  /* 카드 */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card-label { color: var(--sub); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .card-value { font-size: 24px; font-weight: 700; line-height: 1; }
  .card-sub { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .ok .card-value   { color: var(--green); }
  .warn .card-value { color: var(--yellow); }
  .bad .card-value  { color: var(--red); }
  .neu .card-value  { color: var(--blue); }

  /* 차트 그리드 */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  @media (max-width: 960px) { .grid2 { grid-template-columns: 1fr; } }
  .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .chart-box h3 { font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
  .chart-box canvas { max-height: 210px; }
  .empty-chart { text-align: center; padding: 48px 0; color: var(--muted); font-size: 13px; }

  /* Checks 테이블 */
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 7px 10px; font-size: 13px; }
  th { color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 12px; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .pass { color: var(--green); }
  .fail { color: var(--red); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>MCP Server</h1>
  <span>k6 Performance Report</span>
  <span class="badge">k6</span>
</header>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <div class="icon">📂</div>
  <p>
    <strong>결과 파일을 드래그하거나 클릭해서 선택하세요</strong><br>
    <code>results/load.json</code>, <code>results/stress.json</code> 등<br>
    대용량 파일도 스트리밍으로 처리합니다
  </p>
</div>
<input type="file" id="file-input" accept=".json" multiple>

<div id="progress-wrap">
  <div id="progress-label">파일 처리 중...</div>
  <div id="progress-track"><div id="progress-fill"></div></div>
</div>

<div id="tabs-bar" style="display:none"></div>
<div id="panels"></div>

<script>
// ── Chart.js 기본값 ───────────────────────────────────────────
Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#334155';
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
Chart.defaults.font.size = 12;
const PAL = ['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#06b6d4','#f97316','#ec4899'];

const charts = {};
let tabCounter = 0;
const seen = new Set();

// ── 백분위 ────────────────────────────────────────────────────
function pct(arr, p) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  return s[Math.max(0, Math.ceil(p / 100 * s.length) - 1)];
}

// ── 상대 시간 레이블 ──────────────────────────────────────────
function relLabel(absMs, startMs) {
  const s = Math.round((absMs - startMs) / 1000);
  return `+${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

// ── 스트리밍 집계기 ───────────────────────────────────────────
// 한 줄씩 받아 처리 → 전체 Point를 메모리에 쌓지 않음
class Aggregator {
  constructor(bucketMs = 15000) {
    this.B = bucketMs;
    this.startMs = Infinity;
    this.endMs   = -Infinity;

    this.durBuckets  = new Map(); // bucketKey → value[] (reservoir)
    this.vusBuckets  = new Map(); // bucketKey → max value
    this.reqBuckets  = new Map(); // bucketKey → count sum
    this.failBuckets = new Map(); // bucketKey → [0|1, ...]

    this.toolDur = new Map(); // tool → value[] (reservoir, max 5000)
    this.toolErr = new Map(); // tool → count

    this.checks  = new Map(); // name → {pass, fail}

    this.totalReqs  = 0;
    this.totalFail  = 0;
    this.totalFailN = 0;
  }

  bk(t) { return Math.floor(t / this.B) * this.B; }

  reservoir(arr, v, cap = 1000) {
    if (arr.length < cap) { arr.push(v); return; }
    const i = Math.floor(Math.random() * (arr.length + 1));
    if (i < cap) arr[i] = v;
  }

  feed(entry) {
    if (entry.type !== 'Point') return;
    const t = new Date(entry.data.time).getTime();
    if (isNaN(t)) return;
    if (t < this.startMs) this.startMs = t;
    if (t > this.endMs)   this.endMs   = t;

    const { metric, data } = entry;
    const v    = data.value;
    const tags = data.tags || {};
    const bk   = this.bk(t);

    switch (metric) {
      case 'http_req_duration':
        if (v > 0) {
          if (!this.durBuckets.has(bk)) this.durBuckets.set(bk, []);
          this.reservoir(this.durBuckets.get(bk), v);
        }
        break;
      case 'vus':
        this.vusBuckets.set(bk, Math.max(this.vusBuckets.get(bk) ?? 0, v));
        break;
      case 'http_reqs':
        this.totalReqs += v;
        this.reqBuckets.set(bk, (this.reqBuckets.get(bk) ?? 0) + v);
        break;
      case 'http_req_failed':
        this.totalFail += v;
        this.totalFailN++;
        if (!this.failBuckets.has(bk)) this.failBuckets.set(bk, []);
        this.failBuckets.get(bk).push(v);
        break;
      case 'mcp_tool_duration':
        if (v > 0) {
          const tool = tags.tool || 'unknown';
          if (!this.toolDur.has(tool)) this.toolDur.set(tool, []);
          this.reservoir(this.toolDur.get(tool), v, 5000);
        }
        break;
      case 'mcp_tool_errors': {
        const tool = tags.tool || 'unknown';
        this.toolErr.set(tool, (this.toolErr.get(tool) ?? 0) + v);
        break;
      }
      case 'checks': {
        const name = tags.check || '?';
        if (!this.checks.has(name)) this.checks.set(name, { pass: 0, fail: 0 });
        const c = this.checks.get(name);
        if (v === 1) c.pass++; else c.fail++;
        break;
      }
    }
  }

  result() {
    if (this.startMs === Infinity) return null;
    const start  = this.startMs;
    const durSec = Math.round((this.endMs - this.startMs) / 1000);
    const errorRate = this.totalFailN
      ? +(this.totalFail / this.totalFailN * 100).toFixed(1) : 0;

    const sortedKeys = m => [...m.keys()].sort((a, b) => a - b);

    // VUs
    const vusKeys = sortedKeys(this.vusBuckets);
    const vusSeries = {
      labels: vusKeys.map(k => relLabel(k, start)),
      data:   vusKeys.map(k => this.vusBuckets.get(k)),
    };
    const peakVUs = vusSeries.data.length ? Math.max(...vusSeries.data) : 0;

    // RPS
    const rpsKeys = sortedKeys(this.reqBuckets);
    const rpsSeries = {
      labels: rpsKeys.map(k => relLabel(k, start)),
      data:   rpsKeys.map(k => +(this.reqBuckets.get(k) / (this.B / 1000)).toFixed(2)),
    };

    // 응답 시간
    const durKeys = sortedKeys(this.durBuckets);
    const p50data = durKeys.map(k => Math.round(pct(this.durBuckets.get(k), 50)));
    const p95data = durKeys.map(k => Math.round(pct(this.durBuckets.get(k), 95)));
    const durLabels = durKeys.map(k => relLabel(k, start));

    const allDur = [...this.durBuckets.values()].flat();
    const globalP95 = allDur.length ? Math.round(pct(allDur, 95)) : 0;
    const globalP99 = allDur.length ? Math.round(pct(allDur, 99)) : 0;

    // 오류율
    const failKeys = sortedKeys(this.failBuckets);
    const errSeries = {
      labels: failKeys.map(k => relLabel(k, start)),
      data: failKeys.map(k => {
        const arr = this.failBuckets.get(k);
        return +(arr.reduce((a, b) => a + b, 0) / arr.length * 100).toFixed(1);
      }),
    };

    // Tool
    const toolNames = [...this.toolDur.keys()].sort();
    const toolAvg   = toolNames.map(t => Math.round(pct(this.toolDur.get(t), 50)));
    const toolP95   = toolNames.map(t => Math.round(pct(this.toolDur.get(t), 95)));
    const toolErrMap = Object.fromEntries(this.toolErr);
    const checkMap   = Object.fromEntries(this.checks);

    return {
      start, durSec, errorRate,
      peakVUs, totalReqs: this.totalReqs, globalP95, globalP99,
      vusSeries, rpsSeries,
      durLabels, p50data, p95data,
      errSeries,
      toolNames, toolAvg, toolP95, toolErrMap,
      checkMap,
    };
  }
}

// ── 스트리밍 파서 (청크 단위로 읽어 한 줄씩 처리) ────────────
async function streamProcess(file, onProgress) {
  const agg     = new Aggregator();
  const reader  = file.stream().getReader();
  const decoder = new TextDecoder();
  let buf  = '';
  let read = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buf  += decoder.decode(value, { stream: true });
    read += value.byteLength;
    onProgress(read / file.size);

    let nl;
    while ((nl = buf.indexOf('\n')) !== -1) {
      const line = buf.slice(0, nl).trim();
      buf = buf.slice(nl + 1);
      if (!line) continue;
      try { agg.feed(JSON.parse(line)); } catch (_) {}
    }

    // 메인 스레드 블로킹 방지
    await new Promise(r => setTimeout(r, 0));
  }

  if (buf.trim()) {
    try { agg.feed(JSON.parse(buf)); } catch (_) {}
  }

  return agg.result();
}

// ── 차트 헬퍼 ────────────────────────────────────────────────
function mkLine(ctx, datasets, labels) {
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: datasets.map((d, i) => ({
        label: d.label, data: d.data,
        borderColor: d.color ?? PAL[i],
        backgroundColor: (d.color ?? PAL[i]) + '22',
        borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
        fill: d.fill ?? false, tension: 0.3,
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { boxWidth: 10, padding: 10 } } },
      scales: {
        x: { ticks: { maxTicksLimit: 8 } },
        y: { beginAtZero: true },
      },
    },
  });
}

function mkBar(ctx, labels, datasets, horizontal = false) {
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: datasets.map((d, i) => ({
        label: d.label, data: d.data,
        backgroundColor: (d.color ?? PAL[i]) + 'cc',
        borderColor: d.color ?? PAL[i],
        borderWidth: 1, borderRadius: 4,
      })),
    },
    options: {
      indexAxis: horizontal ? 'y' : 'x',
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { labels: { boxWidth: 10 } } },
      scales: { x: { beginAtZero: true }, y: { beginAtZero: true } },
    },
  });
}

// ── 패널 렌더링 ───────────────────────────────────────────────
function renderPanel(id, d) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  const errColor = d.errorRate > 10 ? 'bad' : d.errorRate > 1 ? 'warn' : 'ok';
  const p95Color = d.globalP95 > 3000 ? 'bad' : d.globalP95 > 1000 ? 'warn' : 'ok';
  const durStr   = `${Math.floor(d.durSec / 60)}분 ${d.durSec % 60}초`;

  const panel = document.createElement('div');
  panel.id = `panel-${id}`;
  panel.className = 'panel active';
  panel.innerHTML = `
    <div class="cards">
      <div class="card neu">
        <div class="card-label">Total Requests</div>
        <div class="card-value">${d.totalReqs.toLocaleString()}</div>
        <div class="card-sub">총 요청 수</div>
      </div>
      <div class="card ${errColor}">
        <div class="card-label">Error Rate</div>
        <div class="card-value">${d.errorRate}%</div>
        <div class="card-sub">http_req_failed</div>
      </div>
      <div class="card ${p95Color}">
        <div class="card-label">p95 Response</div>
        <div class="card-value">${d.globalP95 ? d.globalP95 + 'ms' : 'N/A'}</div>
        <div class="card-sub">p99: ${d.globalP99 ? d.globalP99 + 'ms' : 'N/A'}</div>
      </div>
      <div class="card neu">
        <div class="card-label">Peak VUs</div>
        <div class="card-value">${d.peakVUs}</div>
        <div class="card-sub">최대 동시 사용자</div>
      </div>
      <div class="card neu">
        <div class="card-label">Duration</div>
        <div class="card-value" style="font-size:19px">${durStr}</div>
        <div class="card-sub">${new Date(d.start).toLocaleTimeString()}</div>
      </div>
    </div>

    <div class="grid2">
      <div class="chart-box"><h3>VUs / RPS</h3><canvas id="c-vus-${id}"></canvas></div>
      <div class="chart-box"><h3>응답 시간 (ms)</h3><canvas id="c-dur-${id}"></canvas></div>
    </div>
    <div class="grid2">
      <div class="chart-box"><h3>오류율 (%)</h3><canvas id="c-err-${id}"></canvas></div>
      <div class="chart-box"><h3>Tool 응답 시간 (avg / p95 ms)</h3><canvas id="c-tdur-${id}"></canvas></div>
    </div>
    <div class="grid2">
      <div class="chart-box"><h3>Tool 오류 횟수</h3><canvas id="c-terr-${id}"></canvas></div>
      <div class="chart-box"><h3>Checks</h3><div id="c-chk-${id}"></div></div>
    </div>
  `;
  document.getElementById('panels').appendChild(panel);

  // VUs + RPS
  charts[`vus-${id}`] = mkLine(
    document.getElementById(`c-vus-${id}`),
    [
      { label: 'VUs', data: d.vusSeries.data, color: '#8b5cf6', fill: true },
      { label: 'RPS', data: d.rpsSeries.data, color: '#22c55e' },
    ],
    d.vusSeries.labels.length ? d.vusSeries.labels : d.rpsSeries.labels,
  );

  // 응답 시간
  charts[`dur-${id}`] = mkLine(
    document.getElementById(`c-dur-${id}`),
    [
      { label: 'p50', data: d.p50data, color: '#3b82f6' },
      { label: 'p95', data: d.p95data, color: '#f59e0b' },
    ],
    d.durLabels,
  );

  // 오류율
  charts[`err-${id}`] = mkLine(
    document.getElementById(`c-err-${id}`),
    [{ label: 'Error Rate (%)', data: d.errSeries.data, color: '#ef4444', fill: true }],
    d.errSeries.labels,
  );

  // Tool 응답 시간
  if (d.toolNames.length) {
    charts[`tdur-${id}`] = mkBar(
      document.getElementById(`c-tdur-${id}`),
      d.toolNames,
      [
        { label: 'avg (ms)', data: d.toolAvg, color: '#3b82f6' },
        { label: 'p95 (ms)', data: d.toolP95, color: '#f59e0b' },
      ],
      true,
    );
  } else {
    document.getElementById(`c-tdur-${id}`).outerHTML = '<div class="empty-chart">데이터 없음</div>';
  }

  // Tool 오류
  const errNames = Object.keys(d.toolErrMap);
  if (errNames.length) {
    charts[`terr-${id}`] = mkBar(
      document.getElementById(`c-terr-${id}`),
      errNames,
      [{ label: '오류 횟수', data: errNames.map(t => d.toolErrMap[t]), color: '#ef4444' }],
      true,
    );
  } else {
    document.getElementById(`c-terr-${id}`).outerHTML = '<div class="empty-chart">오류 없음 🎉</div>';
  }

  // Checks 테이블
  const chkEl = document.getElementById(`c-chk-${id}`);
  const names  = Object.keys(d.checkMap);
  if (names.length) {
    const rows = names.map(name => {
      const { pass, fail } = d.checkMap[name];
      const total = pass + fail;
      const rate  = total ? pass / total * 100 : 0;
      const col   = rate >= 99 ? '#22c55e' : rate >= 80 ? '#f59e0b' : '#ef4444';
      return `<tr>
        <td style="font-size:12px">${name}</td>
        <td class="pass">${pass.toLocaleString()}</td>
        <td class="fail">${fail.toLocaleString()}</td>
        <td>
          <div class="bar-wrap">
            <div class="bar-track"><div class="bar-fill" style="width:${rate.toFixed(0)}%;background:${col}"></div></div>
            <span style="min-width:36px;font-size:12px;color:${col}">${rate.toFixed(0)}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');
    chkEl.innerHTML = `
      <table>
        <thead><tr><th>Check</th><th class="pass">Pass</th><th class="fail">Fail</th><th>Rate</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    chkEl.innerHTML = '<div class="empty-chart">데이터 없음</div>';
  }
}

// ── 탭 관리 ──────────────────────────────────────────────────
function activateTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id));
  document.querySelectorAll('.panel').forEach(p =>
    p.classList.toggle('active', p.id === `panel-${id}`));
}

function removeTab(id) {
  Object.keys(charts).filter(k => k.endsWith(`-${id}`))
    .forEach(k => { charts[k].destroy(); delete charts[k]; });
  document.getElementById(`panel-${id}`)?.remove();
  document.querySelector(`.tab-btn[data-id="${id}"]`)?.remove();

  const rest = document.querySelectorAll('.tab-btn');
  if (rest.length) {
    activateTab(rest[rest.length - 1].dataset.id);
  } else {
    document.getElementById('tabs-bar').style.display = 'none';
    document.getElementById('drop-zone').style.display = 'block';
  }
}

function addTab(name, data) {
  const id = String(++tabCounter);
  const tabsBar = document.getElementById('tabs-bar');

  tabsBar.style.display = 'flex';
  document.getElementById('drop-zone').style.display = 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  const btn = document.createElement('button');
  btn.className = 'tab-btn active';
  btn.dataset.id = id;
  btn.innerHTML = `${name}<span class="tab-x" title="닫기">✕</span>`;
  btn.addEventListener('click', e => {
    if (e.target.classList.contains('tab-x')) { removeTab(id); return; }
    activateTab(id);
  });
  tabsBar.appendChild(btn);
  renderPanel(id, data);
}

// ── 파일명 → 탭 이름 ─────────────────────────────────────────
function displayName(filename) {
  const base = filename.replace(/\.json$/i, '');
  const map  = { load: 'Load Test', stress: 'Stress Test', soak: 'Soak Test', spike: 'Spike Test' };
  for (const [k, v] of Object.entries(map))
    if (base.toLowerCase().includes(k)) return v;
  return base;
}

// ── 파일 처리 ────────────────────────────────────────────────
const progressWrap  = document.getElementById('progress-wrap');
const progressFill  = document.getElementById('progress-fill');
const progressLabel = document.getElementById('progress-label');

async function handleFile(file) {
  if (!file.name.endsWith('.json')) return;
  const key = file.name + file.size;
  if (seen.has(key)) return;
  seen.add(key);

  const sizeMB = (file.size / 1024 / 1024).toFixed(1);
  progressWrap.style.display = 'block';
  progressLabel.textContent  = `처리 중: ${file.name} (${sizeMB} MB)`;
  progressFill.style.width   = '0%';

  try {
    const data = await streamProcess(file, ratio => {
      progressFill.style.width  = `${(ratio * 100).toFixed(0)}%`;
      progressLabel.textContent = `처리 중: ${file.name} — ${(ratio * 100).toFixed(0)}%`;
    });

    if (!data) { alert(`${file.name}: 유효한 k6 결과 파일이 아닙니다.`); return; }
    addTab(displayName(file.name), data);
  } catch (e) {
    alert(`${file.name} 처리 중 오류: ${e.message}`);
  } finally {
    progressWrap.style.display = 'none';
  }
}

// ── 이벤트 ───────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  [...e.target.files].reduce((p, f) => p.then(() => handleFile(f)), Promise.resolve());
  e.target.value = '';
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  [...e.dataTransfer.files].reduce((p, f) => p.then(() => handleFile(f)), Promise.resolve());
});
</script>
